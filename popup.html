<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Church Directory</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <p class="govuk-kicker">Northern District Council</p>
      <h1>Church Directory</h1>
      <p style="margin: 6px 0 0;">
        <a href="index.html" style="color: #ffffff; text-decoration: underline;">Back</a>
      </p>
    </header>

    <main>
      <ul id="church-list" class="church-list" aria-label="Church charity list"></ul>
    </main>

    <template id="church-item-template">
      <li class="church-card">
        <a class="church-link" target="_blank" rel="noopener noreferrer">
          <span class="church-name"></span>
          <span class="church-number"></span>
        </a>
        <div class="church-links" aria-label="Church links">
          <a class="church-link-icon church-link-people" target="_blank" rel="noopener noreferrer" aria-label="Trustees">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <circle cx="8" cy="8" r="3.25"></circle>
              <circle cx="16.5" cy="9" r="2.75"></circle>
              <path d="M2.5 19.5c0-3.25 3-5.75 5.75-5.75h.5c2.75 0 5.75 2.5 5.75 5.75"></path>
              <path d="M12.75 19.5c.2-2.3 2.2-4 4.5-4h.4c2.15 0 3.85 1.4 4.35 3.5"></path>
            </svg>
          </a>
          <a class="church-link-icon church-link-facebook" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M14 8h2V5h-2c-2.2 0-4 1.8-4 4v2H7v3h3v6h3v-6h2.5l.5-3H13V9c0-.6.4-1 1-1z"></path>
            </svg>
          </a>
          <a class="church-link-icon church-link-website" target="_blank" rel="noopener noreferrer" aria-label="Website">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M3 12h18"></path>
              <path d="M12 3c2.5 2.5 2.5 15.5 0 18"></path>
              <path d="M12 3c-2.5 2.5-2.5 15.5 0 18"></path>
            </svg>
          </a>
        </div>
      </li>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
