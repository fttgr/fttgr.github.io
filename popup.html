<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Church Directory</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <p class="govuk-kicker">Northern District Council</p>
      <h1>Church Directory</h1>
      <p style="margin: 6px 0 0;">
        <a href="index.html" style="color: #ffffff; text-decoration: underline;">Back</a>
      </p>
    </header>

    <main>
      <ul id="church-list" class="church-list" aria-label="Church charity list"></ul>
    </main>

    <template id="church-item-template">
      <li class="church-card">
        <a class="church-link" target="_blank" rel="noopener noreferrer">
          <span class="church-name"></span>
          <span class="church-number"></span>
        </a>
      </li>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
